# Workflow name shown in GitHub Actions UI
name: CI

# Trigger conditions
on:
  # Run on PRs targeting main
  pull_request:
    branches:
      - main

  # Run on direct pushes to main
  push:
    branches:
      - main

jobs:
  # -----------------------------------
  # JOB 1: Lint, Test, Build Vite App
  # -----------------------------------
  build-and-test:
    name: Build Vite React App
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: npm

      # Step 3: Install dependencies (clean & reproducible)
      - name: Install dependencies
        run: npm ci

      # Step 4: Run ESLint
      - name: Run ESLint
        run: npm run lint

      # Step 5: Run tests
      # Works for Vitest / Jest
      - name: Run tests
        run: npm run test

      # Step 6: Build Vite app
      - name: Build app
        run: npm run build

      # Step 7: Upload build artifacts (optional but useful)
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: dist
          path: dist/

  # -----------------------------------
  # JOB 2: Build & Push Docker Image
  # -----------------------------------
  build-and-push-docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    needs: build-and-test

    # Only push Docker image on main branch push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    env:
      IMAGE_NAME: hariharanreddy/vite-react-app
      IMAGE_TAG: build-${{ github.run_number }}

    steps:
      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      # Step 3: Build Docker image
      - name: Build Docker image
        run: |
          docker build \
            --platform linux/amd64 \
            -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            .

      # Step 4: Push Docker image
      - name: Push Docker image
        run: docker push ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
